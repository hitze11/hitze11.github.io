<!DOCTYPE html>

<head>

    <title>Contact</title>
    <link rel="stylesheet" href="styles/styles.css">
    <style>
        body {
            background-image: url('images/back.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: white;
        }

        header {
            text-align: center;
            padding: 20px 0;
        }

        nav {
            display: flex;
            justify-content: space-between; /* Elemente links und rechts platzieren */
            align-items: center;
            background: linear-gradient(145deg, #2a3b55, #1b283d);
            border: 2px solid #1a2434;
            border-radius: 50px;
            margin: 20px auto;
            padding: 10px 20px;
            max-width: 90%;
            box-shadow: 0px 6px 12px rgba(0, 0, 0, 0.5), inset 0px 2px 6px rgba(255, 255, 255, 0.1);
        }

        nav a {
            color: #dfe6f1;
            padding: 14px 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            margin: 0 10px;
            background: linear-gradient(145deg, #1c2737, #2c3e5b);
            border-radius: 25px;
            box-shadow: inset 0px 4px 6px rgba(0, 0, 0, 0.4), 0px 2px 4px rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        nav a:hover,
        nav a:active {
            background: linear-gradient(145deg, #2c3e5b, #1c2737);
            color: #ADD8E6;
            transform: scale(1.05);
        }

        .nav-logo {
            width: 60px; /* Logo-Größe */
            height: auto;
            border-radius: 50%; /* Rundes Logo */
        }

        section {
            padding: 20px;
        }

        table {
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: stretch;
        }

        table ul {
            list-style: none;
            padding: 0;
        }

        table a {
            color: white;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        table a:hover {
            color: #ADD8E6;
        }

        td {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding: 10px;
        }

        img {
            border-radius: 5px;
        }

        hr {
            border: 1px solid #444;
            margin: 20px auto;
            max-width: 90%;
        }
    </style>
</head>
