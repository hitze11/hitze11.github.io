<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="styles/styles.css">
    <style>
        body {
            background-image: url('images/back.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 20px 0;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(145deg, #2a3b55, #1b283d);
            border: 2px solid #1a2434;
            border-radius: 50px;
            margin: 20px auto;
            padding: 10px 20px;
            max-width: 90%;
            box-shadow: 0px 6px 12px rgba(0, 0, 0, 0.5), inset 0px 2px 6px rgba(255, 255, 255, 0.1);
        }

        nav a {
            color: #dfe6f1;
            padding: 14px 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            margin: 0 10px;
            background: linear-gradient(145deg, #1c2737, #2c3e5b);
            border-radius: 25px;
            box-shadow: inset 0px 4px 6px rgba(0, 0, 0, 0.4), 0px 2px 4px rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        nav a:hover,
        nav a:active {
            background: linear-gradient(145deg, #2c3e5b, #1c2737);
            color: #ADD8E6;
            transform: scale(1.05);
        }

        .nav-logo {
            width: 50px;
            height: auto;
            border-radius: 50%;
        }

        section {
            padding: 20px;
            flex: 1;
        }


        footer {
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #1a2434;
            padding: 10px 0;
            z-index: 10;
        }

        footer a {
            margin: 0 10px;
        }

        footer img {
            height: 50px;
            transition: transform 0.3s ease;
        }

        footer img:hover {
            transform: scale(1.2);
        }
    </style>
</head>

<body>
    <header>
        <h1>Ronny Stieber</h1>
    </header>

    <nav>

        <img src="images/logo.jpeg" alt="Logo" class="nav-logo">


        <a href="about.html">About Me</a>
        <a href="projects.html">Projekte</a>
        <a href="certificates.html">Zertifikate</a>
        <a href="contact.html">Kontakt</a>


        <img src="images/logo.jpeg" alt="Logo" class="nav-logo">
    </nav>

    <section>
        <p>Willkommen auf meiner Portfoliowebsite!</p>
    </section>


    <footer>
        <a href="https://www.instagram.com/ronny_s4_b6/" target="_blank"><img src="images/qr.png" height="50"
                title="Insta" /></a>
        <a href="https://www.youtube.com/@okronnystieber8659" target="_blank"><img src="images/tube.png" height="50"
                title="YouTube" /></a>
        <a href="https://github.com/hitze11" target="_blank"><img src="images/git.png" height="50" title="Github" /></a>
    </footer>
</body>

</html>
